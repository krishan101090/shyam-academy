name: Sync NIOS updates daily

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Crawl NIOS notices
        run: node scripts/fetch-updates.mjs
        continue-on-error: true
      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/updates.json src/app/sitemap.ts public/robots.txt
          if git diff --staged --quiet; then
            echo "No updates to commit"
            exit 0
          fi
          git commit -m "chore: sync NIOS news and admission updates"
          git push
